<!DOCTYPE html>
<html>
<head>
    <title>Bitcoin Chart Test</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div style="width: 400px; height: 200px;">
        <canvas id="btcChart"></canvas>
    </div>
    
    <script>
        async function initChart() {
            const canvas = document.getElementById('btcChart');
            if (!canvas) return;
            
            try {
                const response = await fetch('https://api.coingecko.com/api/v3/coins/bitcoin/market_chart?vs_currency=usd&days=7');
                const data = await response.json();
                
                const prices = data.prices.map(price => ({ x: price[0], y: price[1] }));
                
                new Chart(canvas, {
                    type: 'line',
                    data: {
                        datasets: [{
                            data: prices,
                            borderColor: '#12e258',
                            backgroundColor: 'rgba(18, 226, 88, 0.1)',
                            borderWidth: 2,
                            fill: true,
                            tension: 0.4,
                            pointRadius: 0
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: { legend: { display: false } },
                        scales: { x: { display: false }, y: { display: false } }
                    }
                });
                console.log('Chart loaded successfully');
            } catch (error) {
                console.error('Chart error:', error);
            }
        }
        
        setTimeout(initChart, 1000);
    </script>
</body>
</html>
